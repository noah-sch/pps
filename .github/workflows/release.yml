name: Release

# Tag a version to build & publish the desktop installers (macOS + Windows) and
# an Android APK, all attached to the same GitHub Release. E.g.:
#   git tag v0.1.0 && git push origin v0.1.0
# The release is created as a draft — review it, then publish.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest # Intel
            args: "--target x86_64-apple-darwin"
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies (root + front)
        run: |
          npm ci
          npm --prefix front ci

      - name: Build & release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Ad-hoc sign the macOS bundle (proper sealed resources) so Gatekeeper
          # reports "unverified" instead of "damaged". Empty on Windows (ignored
          # there). NOT notarized — users still bypass once; see README.
          APPLE_SIGNING_IDENTITY: ${{ matrix.platform == 'macos-latest' && '-' || '' }}
        with:
          projectPath: .
          tagName: ${{ github.ref_name }}
          releaseName: "PPS ${{ github.ref_name }}"
          releaseBody: "Voir CHANGELOG.md pour les détails de cette version."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # ── Android APK ─────────────────────────────────────────────────────────────
  # Runs after the desktop job (which creates the draft release) and attaches a
  # universal APK to it.
  #
  # If the ANDROID_KEYSTORE_BASE64 secret is set → builds a RELEASE APK signed
  # with that stable keystore (apksigner). Same key on every release means new
  # APKs install as real UPDATES that keep the user's local database.
  # If the secret is absent → falls back to a DEBUG APK (ephemeral key, NOT
  # updatable across releases) so the workflow still works without secrets.
  #
  # Required repo secrets for signed releases:
  #   ANDROID_KEYSTORE_BASE64    base64 of your release .jks
  #   ANDROID_KEYSTORE_PASSWORD  keystore password
  #   ANDROID_KEY_ALIAS          key alias
  #   ANDROID_KEY_PASSWORD       key password
  android:
    name: Android APK
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK + platform + build-tools
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "ndk;27.2.12479018"
          echo "NDK_HOME=$(ls -d "$ANDROID_HOME"/ndk/* | sort -V | tail -n1)" >> "$GITHUB_ENV"

      - name: Setup Rust (Android targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: android

      - name: Install dependencies (root + front)
        run: |
          npm ci
          npm --prefix front ci

      - name: Build & sign Android APK
        id: apk
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -e
          npm run tauri -- android init --skip-targets-install
          OUT="PPS_${{ github.ref_name }}_android.apk"
          BT="$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -n1)"
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "→ Release build signed with the project keystore (installs as an update)."
            npm run tauri -- android build --apk
            UNSIGNED=$(find src-tauri/gen/android -path '*outputs/apk*release*' -name '*.apk' | head -n1)
            if [ -z "$UNSIGNED" ]; then
              echo "::error::No release APK produced"; find src-tauri/gen/android -name '*.apk'; exit 1
            fi
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
            "$BT/zipalign" -p -f 4 "$UNSIGNED" "$RUNNER_TEMP/aligned.apk"
            "$BT/apksigner" sign \
              --ks "$RUNNER_TEMP/release.jks" \
              --ks-pass "pass:$ANDROID_KEYSTORE_PASSWORD" \
              --ks-key-alias "$ANDROID_KEY_ALIAS" \
              --key-pass "pass:$ANDROID_KEY_PASSWORD" \
              --out "$OUT" "$RUNNER_TEMP/aligned.apk"
            rm -f "$RUNNER_TEMP/release.jks" "$RUNNER_TEMP/aligned.apk"
          else
            echo "::warning::No ANDROID_KEYSTORE_BASE64 secret — building a DEBUG APK."
            echo "::warning::Debug APKs use an ephemeral key and CANNOT be installed as an update over a previous release."
            npm run tauri -- android build --apk --debug
            APK=$(find src-tauri/gen/android -path '*outputs/apk*' -name '*.apk' | grep -i universal | grep -i debug | head -n1)
            [ -z "$APK" ] && APK=$(find src-tauri/gen/android -name '*.apk' | head -n1)
            if [ -z "$APK" ]; then echo "::error::No APK produced"; exit 1; fi
            cp "$APK" "$OUT"
          fi
          echo "path=$OUT" >> "$GITHUB_OUTPUT"
          echo "Produced $OUT"

      - name: Upload APK to the release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "${{ steps.apk.outputs.path }}" --clobber
